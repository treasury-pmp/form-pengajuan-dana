<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Form Pengajuan Dana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#111114;
    --muted:#8a8a93;
    --line:#e6e6ea;
    --accent:#111114;
    --gold:#b08d3e;
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #f4f1ec 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #f2f2f5 0%, transparent 55%),
      #ffffff;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  /* ---------- cinematic entrance ---------- */
  .reveal{opacity:0;transform:translateY(26px);animation:rise 1s var(--ease) forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .d1{animation-delay:.05s}.d2{animation-delay:.18s}.d3{animation-delay:.3s}
  .d4{animation-delay:.42s}.d5{animation-delay:.54s}.d6{animation-delay:.66s}.d7{animation-delay:.78s}.d8{animation-delay:.9s}

  .wrap{max-width:680px;margin:0 auto;padding:64px 24px 96px}

  /* ---------- header ---------- */
  .kicker{
    display:flex;align-items:center;gap:14px;
    font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--muted);
    margin-bottom:18px;
  }
  .kicker::before,.kicker::after{content:'';height:1px;background:var(--line);flex:0 0 42px}
  .kicker::after{flex:1}
  h1{
    font-family:'Fraunces',serif;font-weight:300;
    font-size:clamp(34px,6vw,52px);line-height:1.08;letter-spacing:-.01em;
  }
  h1 em{font-style:italic;color:var(--gold)}
  .sub{margin-top:14px;color:var(--muted);font-size:14px;font-weight:300;max-width:46ch;line-height:1.7}

  /* ---------- sections ---------- */
  .section{margin-top:52px}
  .sec-title{
    display:flex;align-items:baseline;gap:12px;margin-bottom:22px;
  }
  .sec-num{font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--gold)}
  .sec-label{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink);font-weight:600}
  .sec-line{flex:1;height:1px;background:var(--line)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:28px}
  @media(max-width:560px){
    .grid2{grid-template-columns:1fr;gap:24px}
    .wrap{padding:40px 20px 72px}
    .section{margin-top:40px}
  }

  .field{position:relative}
  .field label{
    display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin-bottom:9px;font-weight:500;
  }
  .field input[type=text],.field input[type=date],.field textarea,.item input{
    width:100%;border:none;border-bottom:1px solid var(--line);background:transparent;
    font-family:'Inter',sans-serif;font-size:16px;font-weight:400;color:var(--ink);
    padding:9px 2px 11px;outline:none;border-radius:0;
    transition:border-color .45s var(--ease);
  }
  .field textarea{resize:vertical;min-height:64px;line-height:1.6}
  .field input[type=date]{-webkit-appearance:none;appearance:none;min-height:42px;background:transparent}
  .field::after,.item .fld::after{
    content:'';position:absolute;left:0;bottom:0;height:1px;width:100%;
    background:var(--ink);transform:scaleX(0);transform-origin:left;
    transition:transform .6s var(--ease);
  }
  .field:focus-within::after,.item .fld:focus-within::after{transform:scaleX(1)}
  ::placeholder{color:#c3c3cb;font-weight:300}

  /* ---------- keperluan items ---------- */
  .item{
    display:grid;grid-template-columns:1fr 190px 34px;gap:16px;align-items:end;
    padding:6px 0 2px;opacity:0;transform:translateY(14px);
    animation:rise .6s var(--ease) forwards;
  }
  @media(max-width:560px){
    .item{grid-template-columns:1fr 40px;grid-template-areas:'a a' 'b x';row-gap:14px}
    .item .fld:not(.rp){grid-area:a}
    .item .rp{grid-area:b}
    .item .btn-x{grid-area:x;justify-self:end;margin-bottom:8px}
  }
  .item .fld{position:relative}
  .item .rp{position:relative}
  .item .rp span{
    position:absolute;left:2px;bottom:12px;font-size:13px;color:var(--muted);pointer-events:none;
  }
  .item .rp input{padding-left:30px;text-align:right;font-variant-numeric:tabular-nums}
  .btn-x{
    width:30px;height:30px;border:1px solid var(--line);border-radius:50%;
    background:#fff;color:var(--muted);font-size:14px;line-height:1;cursor:pointer;
    transition:all .35s var(--ease);margin-bottom:5px;
  }
  .btn-x:hover{border-color:#d33;color:#d33;transform:rotate(90deg)}

  .btn-add{
    margin-top:20px;display:inline-flex;align-items:center;gap:12px;
    background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;
    font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink);font-weight:500;
  }
  .btn-add .plus{
    width:38px;height:38px;border-radius:50%;border:1px solid var(--ink);
    display:grid;place-items:center;font-size:18px;font-weight:300;
    transition:all .45s var(--ease);
  }
  .btn-add:hover .plus{background:var(--ink);color:#fff;transform:rotate(90deg)}

  /* ---------- bank dropdown ---------- */
  .dd{
    position:absolute;left:0;right:0;top:100%;z-index:30;display:none;
    background:#fff;border:1px solid var(--line);
    max-height:236px;overflow-y:auto;
    box-shadow:0 18px 40px -18px rgba(17,17,20,.22);
  }
  .dd.open{display:block}
  .dd-item{padding:11px 14px;font-size:14px;cursor:pointer;transition:background .15s}
  .dd-item:hover,.dd-item.active{background:#faf8f4;color:var(--gold)}
  .dd-empty{padding:11px 14px;font-size:12px;color:var(--muted);font-style:italic}

  /* ---------- total ---------- */
  .total{
    margin-top:34px;padding:22px 26px;
    display:flex;justify-content:space-between;align-items:baseline;
    border:1px solid var(--line);border-left:3px solid var(--gold);
    background:linear-gradient(180deg,#fdfcfa, #faf8f4);
  }
  .total .t-label{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
  .total .t-val{
    font-family:'Fraunces',serif;font-weight:600;font-size:clamp(22px,4vw,30px);
    font-variant-numeric:tabular-nums;transition:opacity .3s;
  }
  .total .t-val small{font-size:.55em;font-weight:400;color:var(--muted);margin-right:6px}

  /* ---------- submit ---------- */
  .btn-submit{
    margin-top:56px;width:100%;padding:20px;cursor:pointer;
    background:var(--ink);color:#fff;border:1px solid var(--ink);
    font-family:'Inter',sans-serif;font-size:12px;letter-spacing:.34em;text-transform:uppercase;font-weight:500;
    position:relative;overflow:hidden;transition:all .5s var(--ease);
  }
  .btn-submit::before{
    content:'';position:absolute;inset:0;background:var(--gold);
    transform:translateX(-101%);transition:transform .55s var(--ease);
  }
  .btn-submit span{position:relative;z-index:1}
  .btn-submit:hover::before{transform:none}
  .btn-submit:disabled{opacity:.55;cursor:wait}
  .err{margin-top:16px;color:#c0392b;font-size:13px;display:none;text-align:center}

  /* ---------- success overlay ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(255,255,255,.96);backdrop-filter:blur(6px);
    display:none;place-items:center;z-index:50;text-align:center;padding:24px;
  }
  .overlay.show{display:grid;animation:fadeIn .6s var(--ease)}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .ok-ring{
    width:88px;height:88px;margin:0 auto 26px;border-radius:50%;
    border:1px solid var(--gold);display:grid;place-items:center;
    animation:pop .8s var(--ease);
  }
  @keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
  .ok-ring svg{width:38px;height:38px;stroke:var(--gold);stroke-width:1.6;fill:none;
    stroke-dasharray:60;stroke-dashoffset:60;animation:draw .9s .3s var(--ease) forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .overlay h2{font-family:'Fraunces',serif;font-weight:300;font-size:30px;margin-bottom:10px}
  .overlay p{color:var(--muted);font-size:14px;line-height:1.7}
  .overlay button{
    margin-top:30px;background:none;border:1px solid var(--ink);padding:13px 34px;cursor:pointer;
    font-size:11px;letter-spacing:.28em;text-transform:uppercase;transition:all .4s var(--ease);
  }
  .overlay button:hover{background:var(--ink);color:#fff}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="kicker reveal d1">Internal Treasury</div>
    <h1 class="reveal d2">Form Pengajuan <em>Dana</em></h1>
    <p class="sub reveal d3">Lengkapi rincian di bawah ini.</p>
  </header>

  <form id="form" autocomplete="off">

    <!-- 01 · Perusahaan -->
    <div class="section reveal d4">
      <div class="sec-title"><span class="sec-num">01</span><span class="sec-label">Perusahaan</span><span class="sec-line"></span></div>
      <div class="field">
        <label for="namaPT">Nama PT</label>
        <input type="text" id="namaPT" placeholder="PT Contoh Sejahtera Abadi" required>
      </div>
    </div>

    <!-- 02 · Periode -->
    <div class="section reveal d5">
      <div class="sec-title"><span class="sec-num">02</span><span class="sec-label">Periode</span><span class="sec-line"></span></div>
      <div class="grid2">
        <div class="field">
          <label for="startDate">Start Date — kebutuhan kapan</label>
          <input type="date" id="startDate" required>
        </div>
        <div class="field">
          <label for="endDate">End Date — dikembalikan kapan</label>
          <input type="date" id="endDate" required>
        </div>
      </div>
    </div>

    <!-- 03 · Keperluan -->
    <div class="section reveal d6">
      <div class="sec-title"><span class="sec-num">03</span><span class="sec-label">Tujuan &amp; Keperluan</span><span class="sec-line"></span></div>
      <div id="items"></div>
      <button type="button" class="btn-add" onclick="addItem()">
        <span class="plus">+</span> Tambah Keperluan
      </button>
      <div class="total">
        <span class="t-label">Total Pengajuan</span>
        <span class="t-val" id="total"><small>Rp</small>0</span>
      </div>
    </div>

    <!-- 04 · Source of Fund -->
    <div class="section reveal d7">
      <div class="sec-title"><span class="sec-num">04</span><span class="sec-label">Source of Fund</span><span class="sec-line"></span></div>
      <div class="field">
        <label for="sof">Pembayaran kembali berasal dari mana</label>
        <textarea id="sof" placeholder="Contoh: pencairan invoice klien A, dana operasional Q3, dst." required></textarea>
      </div>
    </div>

    <!-- 05 · Rekening -->
    <div class="section reveal d8">
      <div class="sec-title"><span class="sec-num">05</span><span class="sec-label">Informasi Rekening</span><span class="sec-line"></span></div>
      <div class="grid2">
        <div class="field">
          <label for="bank">Bank</label>
          <input type="text" id="bank" placeholder="Ketik / pilih bank" autocomplete="off" required>
          <div class="dd" id="bankDD"></div>
        </div>
        <div class="field">
          <label for="atasNama">Atas Nama</label>
          <input type="text" id="atasNama" placeholder="Nama pemilik rekening" required>
        </div>
      </div>
      <div class="field" style="margin-top:28px">
        <label for="noRek">Nomor Rekening</label>
        <input type="text" id="noRek" inputmode="numeric" placeholder="Contoh: 1234567890" required>
      </div>
    </div>

    <button type="submit" class="btn-submit" id="btnSubmit"><span>Kirim Pengajuan</span></button>
    <div class="err" id="err"></div>
  </form>
</div>

<!-- success -->
<div class="overlay" id="overlay">
  <div>
    <div class="ok-ring"><svg viewBox="0 0 24 24"><polyline points="4 12.5 10 18.5 20 6.5"/></svg></div>
    <h2>Pengajuan Terkirim</h2>
    <p>Data Anda telah tercatat langsung di spreadsheet.</p>
    <button type="button" onclick="resetAll()">Buat Pengajuan Baru</button>
  </div>
</div>

<script>
  var items = document.getElementById('items');

  function addItem(){
    var row = document.createElement('div');
    row.className = 'item';
    row.innerHTML =
      '<div class="fld"><label style="display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;font-weight:500">Keperluan</label>' +
      '<input type="text" class="i-tujuan" placeholder="Contoh: pembelian material" required></div>' +
      '<div class="fld rp"><label style="display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;font-weight:500">Jumlah</label>' +
      '<span>Rp</span><input type="text" inputmode="numeric" class="i-jumlah" placeholder="0" required></div>' +
      '<button type="button" class="btn-x" title="Hapus" onclick="removeItem(this)">&times;</button>';
    items.appendChild(row);
    row.querySelector('.i-jumlah').addEventListener('input', onAmount);
    row.querySelector('.i-tujuan').focus();
    updateRemoveButtons();
  }

  function removeItem(btn){
    btn.closest('.item').remove();
    updateRemoveButtons();
    updateTotal();
  }

  function updateRemoveButtons(){
    var rows = items.querySelectorAll('.item');
    rows.forEach(function(r){
      r.querySelector('.btn-x').style.visibility = rows.length > 1 ? 'visible' : 'hidden';
    });
  }

  function onAmount(e){
    var digits = e.target.value.replace(/\D/g,'');
    e.target.value = digits ? Number(digits).toLocaleString('id-ID') : '';
    updateTotal();
  }

  function parseAmount(v){ return Number(String(v).replace(/\D/g,'')) || 0; }

  function updateTotal(){
    var total = 0;
    items.querySelectorAll('.i-jumlah').forEach(function(inp){ total += parseAmount(inp.value); });
    document.getElementById('total').innerHTML = '<small>Rp</small>' + total.toLocaleString('id-ID');
  }

  function showErr(msg){
    var el = document.getElementById('err');
    el.textContent = msg; el.style.display = 'block';
  }

  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz7GrBKHIVqmZGCfnGU9Upy9cHcKYgrkZbeeF65TAZjdVKu-PJ1eBMpgxG2erodLVagtQ/exec';

  document.getElementById('form').addEventListener('submit', function(ev){
    ev.preventDefault();
    document.getElementById('err').style.display = 'none';

    var start = document.getElementById('startDate').value;
    var end = document.getElementById('endDate').value;
    if (end < start) { showErr('End Date tidak boleh sebelum Start Date.'); return; }

    var list = [];
    var valid = true;
    items.querySelectorAll('.item').forEach(function(r){
      var t = r.querySelector('.i-tujuan').value.trim();
      var j = parseAmount(r.querySelector('.i-jumlah').value);
      if (!t || j <= 0) valid = false;
      list.push({ tujuan: t, jumlah: j });
    });
    if (!valid) { showErr('Setiap keperluan harus diisi beserta jumlah rupiahnya (lebih dari 0).'); return; }

    var payload = {
      namaPT: document.getElementById('namaPT').value.trim(),
      startDate: start,
      endDate: end,
      items: list,
      sourceOfFund: document.getElementById('sof').value.trim(),
      bank: document.getElementById('bank').value.trim(),
      atasNama: document.getElementById('atasNama').value.trim(),
      noRek: document.getElementById('noRek').value.trim()
    };

    var btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.querySelector('span').textContent = 'Mengirim…';

    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    })
      .then(function(r){ return r.json(); })
      .then(function(res){
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Kirim Pengajuan';
        if (res && res.ok) {
          document.getElementById('overlay').classList.add('show');
        } else {
          showErr(res && res.error ? res.error : 'Terjadi kesalahan. Coba lagi.');
        }
      })
      .catch(function(e){
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Kirim Pengajuan';
        showErr('Gagal terhubung: ' + e.message);
      });
  });

  function resetAll(){
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('form').reset();
    items.innerHTML = '';
    addItem();
    updateTotal();
    window.scrollTo({top:0, behavior:'smooth'});
  }

  // ----- dropdown bank (combobox) -----
  var BANKS = ["Allo Bank", "ANZ Indonesia", "Bank Aceh Syariah", "Bank Aladin Syariah", "Bank Amar Indonesia", "Bank Artha Graha Internasional", "Bank Banten", "Bank Bengkulu", "Bank BJB", "Bank BJB Syariah", "Bank BPD Bali", "Bank BPD DIY", "Bank Bumi Arta", "Bank Capital Indonesia", "Bank Danamon", "Bank DKI", "Bank Ganesha", "Bank INA Perdana", "Bank Index Selindo", "Bank Jago", "Bank Jambi", "Bank Jateng", "Bank Jatim", "Bank Kalbar", "Bank Kalsel", "Bank Kalteng", "Bank Kaltimtara", "Bank Lampung", "Bank Maluku Malut", "Bank Mandiri", "Bank Mandiri Taspen", "Bank MAS (Multiarta Sentosa)", "Bank Maspion", "Bank Mayapada", "Bank Mayora", "Bank Mega", "Bank Mega Syariah", "Bank Mestika Dharma", "Bank MNC Internasional", "Bank Muamalat", "Bank Nagari", "Bank Neo Commerce", "Bank NTB Syariah", "Bank NTT", "Bank of China (Jakarta)", "Bank Oke Indonesia", "Bank Papua", "Bank Prima Master", "Bank Raya", "Bank Resona Perdania", "Bank Riau Kepri Syariah", "Bank Sahabat Sampoerna", "Bank Saqu (Jasa Jakarta)", "Bank SBI Indonesia", "Bank Shinhan Indonesia", "Bank Sinarmas", "Bank Sulselbar", "Bank Sulteng", "Bank Sultra", "Bank SulutGo", "Bank Sumsel Babel", "Bank Sumut", "Bank Victoria", "Bank Victoria Syariah", "Bank Woori Saudara", "BCA", "BCA Digital (blu)", "BCA Syariah", "BNI", "BRI", "BSI (Bank Syariah Indonesia)", "BTN", "BTPN Syariah", "CCB Indonesia", "CIMB Niaga", "Citibank Indonesia", "CTBC Indonesia", "DBS Indonesia", "Hana Bank", "HSBC Indonesia", "IBK Indonesia", "ICBC Indonesia", "J Trust Bank", "KB Bank (Bukopin)", "KB Bukopin Syariah", "Krom Bank", "LINE Bank", "Maybank Indonesia", "Nobu Bank", "OCBC Indonesia", "Panin Bank", "Panin Dubai Syariah", "PermataBank", "SeaBank", "SMBC Indonesia (BTPN)", "Standard Chartered Indonesia", "Superbank", "UOB Indonesia"];
  var bankInput = document.getElementById('bank');
  var bankDD = document.getElementById('bankDD');
  var bankIdx = -1;

  function openBankDD(list){
    if (!list.length) {
      bankDD.innerHTML = '<div class="dd-empty">Bank tidak ditemukan \u2014 nama yang Anda ketik akan dipakai.</div>';
    } else {
      bankDD.innerHTML = list.map(function(b){ return '<div class="dd-item">' + b + '</div>'; }).join('');
    }
    bankDD.classList.add('open');
    bankIdx = -1;
  }
  function closeBankDD(){ bankDD.classList.remove('open'); bankIdx = -1; }
  function filterBanks(){
    var q = bankInput.value.trim().toLowerCase();
    return q ? BANKS.filter(function(b){ return b.toLowerCase().indexOf(q) !== -1; }) : BANKS;
  }
  bankInput.addEventListener('input', function(){ openBankDD(filterBanks()); });
  bankInput.addEventListener('focus', function(){ openBankDD(filterBanks()); });
  bankInput.addEventListener('keydown', function(e){
    var items = bankDD.querySelectorAll('.dd-item');
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      if (!bankDD.classList.contains('open')) { openBankDD(filterBanks()); return; }
      if (!items.length) return;
      bankIdx = e.key === 'ArrowDown' ? (bankIdx + 1) % items.length : (bankIdx - 1 + items.length) % items.length;
      items.forEach(function(it, i){ it.classList.toggle('active', i === bankIdx); });
      items[bankIdx].scrollIntoView({block:'nearest'});
    } else if (e.key === 'Enter') {
      if (bankDD.classList.contains('open')) {
        e.preventDefault();
        if (bankIdx >= 0 && items[bankIdx]) bankInput.value = items[bankIdx].textContent;
        closeBankDD();
      }
    } else if (e.key === 'Escape') { closeBankDD(); }
  });
  bankDD.addEventListener('mousedown', function(e){
    var t = e.target.closest('.dd-item');
    if (t) { e.preventDefault(); bankInput.value = t.textContent; closeBankDD(); }
  });
  document.addEventListener('click', function(e){
    if (!e.target.closest('#bank') && !e.target.closest('#bankDD')) closeBankDD();
  });

  // init
  addItem();
</script>
</body>
</html>
